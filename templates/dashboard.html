<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Solar Voltage Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAqYMbRUt53GCgmnvqonwYB1TJIyWNzVYI",
      authDomain: "irradianceprediction.firebaseapp.com",
      databaseURL: "https://irradianceprediction-default-rtdb.firebaseio.com",
      projectId: "irradianceprediction",
      storageBucket: "irradianceprediction.firebasestorage.app",
      messagingSenderId: "917122098839",
      appId: "1:917122098839:web:5ecfa477b8644bb5f96bd2",
      measurementId: "G-LSTLKCC4DW"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let compareChart;

    async function fetchDataAndPlot() {
      try {
        const snapshot = await get(child(ref(db), 'next_hour_predictions'));
        if (!snapshot.exists()) {
          console.error("No data found in Firebase.");
          return;
        }

        const data = snapshot.val();
        const entries = Object.values(data);

        entries.sort((a, b) => new Date(a.time) - new Date(b.time));
        const recent = entries.slice(-60);

        const labels = recent.map(e =>
          new Date(e.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        );
        const actualValues = recent.map(e => e.actual);
        const predictedValues = recent.map(e => e.predicted);
        const temperatures = recent.map(e => e.temperature ?? null);
        const humidities = recent.map(e => e.humidity ?? null);

        if (compareChart) compareChart.destroy();

        compareChart = new Chart(document.getElementById('compareChart'), {
          type: 'line',
          data: {
            labels,
            datasets: [
              {
                label: 'Actual Voltage (V)',
                data: actualValues,
                borderColor: '#4caf50',
                backgroundColor: '#4caf5044',
                fill: false,
                tension: 0.4,
                pointRadius: 2
              },
              {
                label: 'Predicted Voltage (V)',
                data: predictedValues,
                borderColor: '#f44336',
                backgroundColor: '#f4433644',
                fill: false,
                tension: 0.4,
                pointRadius: 2
              },
              {
                label: 'Temperature (°C)',
                data: temperatures,
                borderColor: '#2196f3',
                backgroundColor: '#2196f344',
                fill: false,
                tension: 0.4,
                pointRadius: 2,
                yAxisID: 'y1'
              },
              {
                label: 'Humidity (%)',
                data: humidities,
                borderColor: '#ff9800',
                backgroundColor: '#ff980044',
                fill: false,
                tension: 0.4,
                pointRadius: 2,
                yAxisID: 'y1'
              }
            ]
          },
          options: {
            responsive: true,
            animation: {
              duration: 1000,
              easing: 'easeOutQuart'
            },
            interaction: {
              mode: 'nearest',
              intersect: false
            },
            scales: {
              x: {
                title: {
                  display: true,
                  text: 'Time'
                },
                ticks: {
                  color: getComputedStyle(document.body).getPropertyValue('--text-color')
                }
              },
              y: {
                title: {
                  display: true,
                  text: 'Voltage (V)'
                },
                ticks: {
                  color: getComputedStyle(document.body).getPropertyValue('--text-color')
                }
              },
              y1: {
                title: {
                  display: true,
                  text: 'Temp / Humidity'
                },
                position: 'right',
                grid: {
                  drawOnChartArea: false
                },
                ticks: {
                  color: getComputedStyle(document.body).getPropertyValue('--text-color')
                }
              }
            },
            plugins: {
              legend: {
                display: true,
                position: 'top',
                labels: {
                  color: getComputedStyle(document.body).getPropertyValue('--text-color')
                }
              },
              title: {
                display: true,
                text: 'Actual vs Predicted Voltage with Temperature & Humidity',
                color: getComputedStyle(document.body).getPropertyValue('--text-color'),
                font: {
                  size: 20
                }
              }
            }
          }
        });

      } catch (error) {
        console.error("Error fetching Firebase data:", error);
      }
    }

    fetchDataAndPlot();
    setInterval(fetchDataAndPlot, 60000);
  </script>

  <style>
    :root {
      --bg-color: #f4f7f9;
      --card-bg: #fff;
      --text-color: #333;
    }

    body.dark {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-color: #eee;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 20px 0 10px;
    }

    canvas {
      width: 95% !important;
      height: 75vh !important;
      max-width: 1200px;
      background: var(--card-bg);
      border-radius: 12px;
      padding: 10px;
    }

    button, label {
      margin: 10px;
      padding: 12px 20px;
      background-color: #1976d2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    button:hover {
      background-color: #1565c0;
    }

    #cleanStatus {
      margin-top: -10px;
      font-weight: bold;
    }

    .switch {
      display: flex;
      align-items: center;
      margin-top: 10px;
    }

    .switch input[type="checkbox"] {
      width: 40px;
      height: 20px;
      appearance: none;
      background-color: #ccc;
      border-radius: 10px;
      position: relative;
      outline: none;
      cursor: pointer;
    }

    .switch input[type="checkbox"]::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background-color: white;
      transform: scale(0.9);
      transition: 0.3s;
      top: 1px;
      left: 1px;
    }

    .switch input[type="checkbox"]:checked {
      background-color: #4caf50;
    }

    .switch input[type="checkbox"]:checked::before {
      transform: translateX(20px) scale(0.9);
    }

    .switch label {
      margin-left: 10px;
      font-size: 14px;
      color: var(--text-color);
    }
  </style>
</head>
<body>
  <h1>Solar Dashboard</h1>
  <canvas id="compareChart"></canvas>

  <div class="switch">
    <input type="checkbox" id="darkToggle" onchange="toggleDarkMode()">
    <label for="darkToggle">Dark Theme</label>
  </div>

  <button onclick="triggerClean()">Manually Clean Solar Panel</button>
  <p id="cleanStatus"></p>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      fetchDataAndPlot(); // Redraw with updated theme colors
    }

    async function triggerClean() {
      try {
        const res = await fetch('/clean', { method: 'POST' });
        const result = await res.json();
        document.getElementById('cleanStatus').innerText = result.status;
      } catch (e) {
        document.getElementById('cleanStatus').innerText = "Error sending clean request.";
      }
    }
  </script>
</body>
</html>
